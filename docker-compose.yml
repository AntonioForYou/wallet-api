version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wallet_postgres
    env_file:
      - config.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USER -d $$DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: migrate/migrate:v4.15.2
    container_name: wallet_migrations
    volumes:
      - ./migrations:/migrations
    command: -path=/migrations -database "postgres://wallet_user:wallet_password@postgres:5432/wallet_db?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy

  wallet-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet_api_app
    ports:
      - "8080:8080"
    env_file:
      - config.env
    depends_on:
      migrations:
        condition: service_completed_successfully

volumes:
  pgdata:
